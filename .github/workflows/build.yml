name: Build Whyred Kernel (KSUN + SUSFS)

on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 'Kernel source repo (owner/name)'
        required: true
        default: 'user-why-red/android_kernel_xiaomi_sdm660_44'
      kernel_branch:
        description: 'Kernel source branch (android-4.4-stable=clean LTS, ksu-patches=KSU pre-patches)'
        required: true
        default: 'android-4.4-stable'
      defconfig:
        description: 'Defconfig name (under arch/arm64/configs/). Leave "auto" to autodetect whyred.'
        required: true
        default: 'auto'
      ksun_branch:
        description: 'KernelSU-Next branch (legacy=non-GKI driver | legacy-susfs=non-GKI+SUSFS | next=GKI only)'
        required: true
        default: 'legacy'
      susfs_branch:
        description: 'SUSFS branch'
        required: true
        default: 'kernel-4.4'
      enable_susfs:
        description: 'Apply SUSFS patches'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']

env:
  TZ: Asia/Jakarta
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4
        with:
          path: builder

      - name: Validate inputs (pre-flight check)
        run: |
          set -e
          echo "Checking kernel source repo accessibility..."
          if ! git ls-remote --exit-code --heads \
              "https://github.com/${{ inputs.kernel_repo }}.git" \
              "${{ inputs.kernel_branch }}" >/dev/null 2>&1; then
            echo "::error::Repo or branch not accessible: https://github.com/${{ inputs.kernel_repo }} @ ${{ inputs.kernel_branch }}"
            echo ""
            echo "Try one of these working sources for whyred (4.4):"
            echo "  - user-why-red/android_kernel_xiaomi_sdm660_44 @ android-4.4-stable"
            echo "  - PotatoDevices/kernel_xiaomi_whyred @ <check branches>"
            echo "  - Darkstar085/kernel_xiaomi_whyred @ <check branches>"
            echo "  - Mina-Project/kernel_xiaomi_whyred @ <check branches>"
            echo "  - meydiwahendra/android_kernel_xiaomi_whyred @ <check branches>"
            exit 1
          fi
          echo "OK: kernel source reachable."

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates ccache cpio \
            curl flex git kmod libelf-dev libssl-dev lz4 \
            make python3 rsync wget xz-utils zip zstd \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            libncurses-dev device-tree-compiler

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: whyred-${{ inputs.kernel_repo }}-${{ inputs.kernel_branch }}
          max-size: 2G

      - name: Clone kernel source
        run: |
          set -e
          git clone --depth=1 -b "${{ inputs.kernel_branch }}" \
            "https://github.com/${{ inputs.kernel_repo }}.git" kernel_source
          cd kernel_source
          echo "KERNEL_VERSION=$(make kernelversion 2>/dev/null || echo unknown)" >> $GITHUB_ENV
          echo "KERNEL_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Resolve defconfig
        working-directory: kernel_source
        run: |
          set -e
          INPUT_DCFG="${{ inputs.defconfig }}"
          CONFIG_DIR="arch/arm64/configs"

          echo "Available defconfigs:"
          ls -1 "${CONFIG_DIR}" 2>/dev/null || true
          echo ""
          # Some sources nest configs under vendor/
          if [ -d "${CONFIG_DIR}/vendor" ]; then
            echo "(vendor/ subdir):"
            ls -1 "${CONFIG_DIR}/vendor"
            echo ""
          fi

          if [ "$INPUT_DCFG" = "auto" ] || [ -z "$INPUT_DCFG" ]; then
            # Try to autodetect a whyred/tulip defconfig
            CANDIDATES="whyred_defconfig whyred-perf_defconfig tulip_defconfig tulip-perf_defconfig sdm660_defconfig sdm660-perf_defconfig"
            FOUND=""
            for c in $CANDIDATES; do
              if [ -f "${CONFIG_DIR}/${c}" ]; then FOUND="$c"; break; fi
              if [ -f "${CONFIG_DIR}/vendor/${c}" ]; then FOUND="vendor/${c}"; break; fi
            done
            if [ -z "$FOUND" ]; then
              echo "::error::Could not autodetect defconfig. List above shows what's available. Re-run with explicit defconfig name."
              exit 1
            fi
            DCFG_PATH="${CONFIG_DIR}/${FOUND}"
            DCFG_NAME="$FOUND"
          else
            if [ -f "${CONFIG_DIR}/${INPUT_DCFG}" ]; then
              DCFG_PATH="${CONFIG_DIR}/${INPUT_DCFG}"
              DCFG_NAME="${INPUT_DCFG}"
            elif [ -f "${CONFIG_DIR}/vendor/${INPUT_DCFG}" ]; then
              DCFG_PATH="${CONFIG_DIR}/vendor/${INPUT_DCFG}"
              DCFG_NAME="vendor/${INPUT_DCFG}"
            else
              echo "::error::Defconfig not found: ${INPUT_DCFG}"
              exit 1
            fi
          fi

          echo "Using defconfig: ${DCFG_NAME}"
          echo "DCFG_PATH=${DCFG_PATH}" >> $GITHUB_ENV
          echo "DCFG_NAME=${DCFG_NAME}" >> $GITHUB_ENV

      - name: Clone toolchain (Proton Clang)
        run: |
          mkdir -p toolchain
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git toolchain/clang

      - name: Clone KernelSU-Next
        working-directory: kernel_source
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/${{ inputs.ksun_branch }}/kernel/setup.sh" \
            | bash -s "${{ inputs.ksun_branch }}"
          if [ -d KernelSU-Next ]; then
            cd KernelSU-Next
            echo "KSUN_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || git rev-parse --short HEAD)" >> $GITHUB_ENV
          fi

      - name: Detect KSU hooks integration mode
        working-directory: kernel_source
        run: |
          set -e
          # KSUN-Next legacy Kbuild specifically checks for "ksu_handle_sys_reboot" 
          # in kernel/reboot.c to validate manual hooks. If not present, must use KPROBES.
          if [ -f kernel/reboot.c ] && grep -q "ksu_handle_sys_reboot" kernel/reboot.c 2>/dev/null; then
            echo "Manual hooks (ksu_handle_sys_reboot) detected -> using MANUAL hooks"
            echo "KSU_HOOK_MODE=manual" >> $GITHUB_ENV
          else
            echo "Manual hooks NOT found in kernel/reboot.c -> using KPROBES hooks (auto-injected at runtime)"
            echo "KSU_HOOK_MODE=kprobes" >> $GITHUB_ENV
          fi

      - name: Clone SUSFS
        if: ${{ inputs.enable_susfs == 'true' }}
        run: |
          git clone --depth=1 -b "${{ inputs.susfs_branch }}" \
            https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu
          cd susfs4ksu
          echo "SUSFS_VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Apply SUSFS patches
        if: ${{ inputs.enable_susfs == 'true' }}
        run: |
          set -e
          cd kernel_source

          # 1) Copy SUSFS kernel sources into kernel tree
          cp ../susfs4ksu/kernel_patches/fs/* fs/ 2>/dev/null || true
          cp ../susfs4ksu/kernel_patches/include/linux/* include/linux/ 2>/dev/null || true

          # 2) Apply kernel-side patch
          KPATCH=$(ls ../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-*.patch 2>/dev/null | head -n1)
          if [ -n "$KPATCH" ]; then
            echo "Applying kernel patch: $KPATCH"
            patch -p1 --forward --fuzz=3 < "$KPATCH" || \
              echo "::warning::Kernel SUSFS patch had rejects. Continuing - check *.rej files."
          fi

          # 3) Apply KSU-Next side patch
          if [ -d KernelSU-Next ]; then
            cd KernelSU-Next
            KSU_PATCH=$(ls ../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch 2>/dev/null || true)
            if [ -n "$KSU_PATCH" ]; then
              echo "Applying KSU-Next SUSFS patch: $KSU_PATCH"
              patch -p1 --forward --fuzz=3 < "$KSU_PATCH" || \
                echo "::warning::KSU-Next SUSFS patch had rejects."
            fi
            cd ..
          fi

      - name: Inject defconfig flags
        working-directory: kernel_source
        run: |
          {
            echo ""
            echo "# === KernelSU-Next ==="
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_DEBUG=n"
            echo "CONFIG_OVERLAY_FS=y"
            # KPROBES infrastructure (needed for KPROBES_HOOK)
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_HAVE_KPROBES=y"
            echo "CONFIG_KPROBE_EVENTS=y"
          } >> "${DCFG_PATH}"

          # Hook mode based on detection in previous step
          if [ "${KSU_HOOK_MODE}" = "kprobes" ]; then
            {
              echo "CONFIG_KSU_KPROBES_HOOK=y"
            } >> "${DCFG_PATH}"
            echo "Using KPROBES hooks (no kernel source patches needed)"
          else
            {
              echo "CONFIG_KSU_MANUAL_HOOK=y"
            } >> "${DCFG_PATH}"
            echo "Using MANUAL hooks (kernel source pre-patched with ksu_handle_sys_reboot)"
          fi

          if [ "${{ inputs.enable_susfs }}" = "true" ]; then
            {
              echo ""
              echo "# === SUSFS ==="
              echo "CONFIG_KSU_SUSFS=y"
              echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
              echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
              echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
              echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
              echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
              echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
              echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
              # CONFIG_KSU_SUSFS_SUS_SU intentionally disabled (unstable on 4.4)
            } >> "${DCFG_PATH}"
          fi

      - name: Build kernel
        working-directory: kernel_source
        env:
          ARCH: arm64
          SUBARCH: arm64
          KBUILD_BUILD_USER: builder
          KBUILD_BUILD_HOST: github-actions
        run: |
          set -eo pipefail
          export PATH="$GITHUB_WORKSPACE/toolchain/clang/bin:$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          echo "=== Toolchain check ==="
          which clang || { echo "::error::clang not found in PATH"; exit 1; }
          clang --version
          aarch64-linux-gnu-ld --version | head -n1
          aarch64-linux-gnu-gcc --version | head -n1
          echo ""

          MAKE_DCFG=$(basename "${DCFG_NAME}")
          echo "=== Generating .config from ${MAKE_DCFG} ==="
          make O=out ARCH=arm64 "${MAKE_DCFG}" 2>&1 | tee -a build.log

          echo ""
          echo "=== Building kernel (Clang+GNU-LD hybrid for 4.4 compat) ==="
          echo "Hook mode: ${KSU_HOOK_MODE}"

          # Export hook mode env vars (KSUN-Next legacy reads these in kernel/Kbuild)
          if [ "${KSU_HOOK_MODE}" = "kprobes" ]; then
            export KSU_KPROBES_HOOK=true
          else
            export KSU_MANUAL_HOOK=true
          fi

          # NOTE: Kernel 4.4 doesn't play nice with ld.lld (empty built-in.o issue).
          # Use Clang for compile but GNU ld (from binutils) for link.
          make O=out ARCH=arm64 \
            CC="ccache clang" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            -j$(nproc --all) 2>&1 | tee -a build.log

          echo ""
          echo "=== Build outputs ==="
          ls -lah out/arch/arm64/boot/ || true

      - name: Verify build artifacts
        working-directory: kernel_source
        run: |
          IMAGE=""
          for cand in \
              out/arch/arm64/boot/Image.gz-dtb \
              out/arch/arm64/boot/Image-dtb \
              out/arch/arm64/boot/Image.gz \
              out/arch/arm64/boot/Image; do
            if [ -f "$cand" ]; then IMAGE="$cand"; break; fi
          done
          if [ -z "$IMAGE" ]; then
            echo "::error::No kernel image produced!"
            ls -lah out/arch/arm64/boot/ || true
            exit 1
          fi
          echo "KERNEL_IMAGE=$IMAGE" >> $GITHUB_ENV
          ls -lah out/arch/arm64/boot/

      - name: Package with AnyKernel3
        run: |
          set -e
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp builder/assets/anykernel.sh AnyKernel3/anykernel.sh

          cp "kernel_source/${KERNEL_IMAGE}" AnyKernel3/

          # Copy DTBs if present
          for f in kernel_source/out/arch/arm64/boot/dtbo.img \
                   kernel_source/out/arch/arm64/boot/dts/qcom/*.dtb; do
            [ -f "$f" ] && cp "$f" AnyKernel3/ || true
          done

          STAMP=$(date -u +%Y%m%d-%H%M)
          ZIPNAME="whyred-ksun-${{ env.KSUN_VERSION }}"
          if [ "${{ inputs.enable_susfs }}" = "true" ]; then
            ZIPNAME="${ZIPNAME}-susfs"
          fi
          ZIPNAME="${ZIPNAME}-${STAMP}-${{ env.KERNEL_SHA }}.zip"

          cd AnyKernel3
          zip -r9 "../${ZIPNAME}" . -x ".git*" -x "README.md"
          cd ..
          echo "OUTZIP=${ZIPNAME}" >> $GITHUB_ENV
          ls -lah "${ZIPNAME}"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: whyred-build-${{ github.run_number }}
          path: |
            ${{ env.OUTZIP }}
            kernel_source/build.log
            kernel_source/**/*.rej
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release
        if: success() && env.OUTZIP != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Whyred KSUN+SUSFS build #${{ github.run_number }}
          body: |
            **Auto-build**
            - Kernel source: `${{ inputs.kernel_repo }}@${{ inputs.kernel_branch }}` (${{ env.KERNEL_SHA }})
            - Kernel version: `${{ env.KERNEL_VERSION }}`
            - Defconfig: `${{ env.DCFG_NAME }}`
            - KernelSU-Next: `${{ inputs.ksun_branch }}` @ `${{ env.KSUN_VERSION }}`
            - SUSFS: `${{ inputs.susfs_branch }}` @ `${{ env.SUSFS_VERSION }}` (enabled: ${{ inputs.enable_susfs }})
          files: ${{ env.OUTZIP }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
